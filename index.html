<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Awesome Mini-Games</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f8ff; /* Light blue background */
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        header {
            background-color: #4CAF50; /* Green header */
            color: white;
            padding: 1rem 0;
            text-align: center;
            border-radius: 8px 8px 0 0;
        }
        header h1 {
            margin: 0;
            font-size: 2.5em;
            letter-spacing: 1px;
        }
        nav {
            background-color: #333;
            color: white;
            padding: 0.8rem 0;
            text-align: center;
            border-radius: 0 0 8px 8px;
            margin-bottom: 20px;
        }
        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
        nav ul li {
            margin: 0 15px;
        }
        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 5px 10px;
            transition: background-color 0.3s ease;
            border-radius: 4px;
        }
        nav ul li a:hover {
            background-color: #555;
        }
        .game-section {
            padding: 20px 0;
            text-align: center;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .game-card {
            background-color: #e0f2f7; /* Lighter blue for cards */
            border: 1px solid #c0e0eb;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .game-card h3 {
            margin-top: 0;
            color: #2196F3; /* Blue for game titles */
        }
        .game-card p {
            font-size: 0.9em;
            color: #666;
        }
        .game-card a {
            display: inline-block;
            background-color: #FF9800; /* Orange play button */
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
        .game-card a:hover {
            background-color: #FB8C00;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1rem 0;
            margin-top: 30px;
            border-radius: 0 0 8px 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>My Mini-Game Hub</h1>
        </header>
        <nav>
            <ul>
                <li><a href="#">All Games</a></li>
                <li><a href="#">Puzzles</a></li>
                <li><a href="#">Action</a></li>
                <li><a href="#">Strategy</a></li>
                <li><a href="#">New Games</a></li>
            </ul>
        </nav>
        <main class="game-section">
            <h2>Explore Our Games!</h2>
            <div class="game-grid">
                <div class="game-card">
                    <h3>Polly Jean stole my pencil</h3>
                    <p>Help find Polly Jean's pencil in this fun adventure!</p>
                    <a href="game1.html">Play Now</a>
                </div>
                <!-- Add more game cards here -->
            </div>
        </main>
        <footer>
            <p>&copy; 2024 My Mini-Game Hub. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
