
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .container { background-color: #ffffff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); max-width: 450px; width: 90%; text-align: center; }Whatever the user has. There are some changes to the new version of colab where markdown files are supported
    .question-text { font-size: 1.3em; color: #333; margin-bottom: 20px; }
    .input-group { margin-bottom: 25px; }
    .input-field { width: calc(100% - 22px); padding: 12px; margin-bottom: 15px; border: 1px solid #ced4da; border-radius: 6px; font-size: 1em; transition: border-color 0.3s ease; box-sizing: border-box; }
    .input-field:focus { border-color: #007bff; outline: none; box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25); }
    .submit-button { background-color: #007bff; color: white; padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1em; transition: background-color 0.3s ease, transform 0.2s ease; width: 100%; } 
    .submit-button:hover { background-color: #0056b3; transform: translateY(-1px); }
    .try-again-button { background-color: #6c757d; color: white; padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1em; transition: background-color 0.3s ease, transform 0.2s ease; width: 100%; margin-top: 20px; display: none; }
    .try-again-button:hover { background-color: #5a6268; transform: translateY(-1px); }
</style>

<div class="container">
    <p class="question-text" id="questionText">What is your name?</p>
    <div id="interactionArea">
        <input type="text" id="nameInput" class="input-field" placeholder="Enter your name">
        <button onclick="displayResponse()" class="submit-button">Submit</button>
    </div>
    <button onclick="resetForm()" class="try-again-button" id="tryAgainButton">Try Again</button>
</div>

<script>
    let currentResponseIndex = 0;
    const responses = [
        "I am sorry, I think your name is Polly Jean.",
        "Oh, almost, but your name is: Polly Jean",
        "No. It's Polly Jean. Please try again",
        "Mmh, that's wrong. I think your name is Polly Jean.<br>Btw random question: did you steal Simon's pencil? ",
        "So close, but I think your name is Polly Jean.<br>That's not such a nice think to do. Is it?",
        "Hmm, that doesn't sound right. I think it is Polly Jean.<br>You do you, of course, but I would never steal a pencil.",
        "Almost! But I'm pretty sure your name is Polly Jean.<br>It just makes me wonder, what else could you steal?",
        "So so close Polly Jean, but your name is Polly Jean.<br>And you are probably thinking: oh it's just a pencil.",
        "And you are right, it is just a pencil, but before you know it...", // Index 8: Automation trigger
        "Clothes",
        "Books",
        "Socks",
        "Oh wait Polly Jean?",
        "YOU ALREADY STOLE ALL THESE THINGS FROM ME!",
        "And that is okay. But let me give you one piece of advice Polly Jean",
        "If you ever see this woman:",
        "<img src='https://raw.githubusercontent.com/SimonVerlinden/Polly-Jean-game/blob/main/assets/polly_witch.jpg' alt='Woman' style='width:100%; max-width: 300px; display: block; margin: 10px auto;'>",
        "Run."
    ];

    const automationStartIndex = 8; // Index from which automation starts
    let isAutomatedSequence = false;

    function displayResponse() {
        var nameInput = document.getElementById('nameInput');
        var interactionArea = document.getElementById('interactionArea');
        var questionText = document.getElementById('questionText');
        var tryAgainButton = document.getElementById('tryAgainButton');

        // Always hide input and button area for sequential display
        interactionArea.style.display = 'none';

        if (currentResponseIndex < responses.length) {
            // Display the current sequential response
            questionText.innerHTML = responses[currentResponseIndex];

            // Check if automation should start or continue
            if (currentResponseIndex >= automationStartIndex) {
                isAutomatedSequence = true;
                tryAgainButton.style.display = 'none'; // Hide 'Try Again' button during automation
                currentResponseIndex++; // Increment for next automated response
                if (currentResponseIndex < responses.length) {
                    setTimeout(displayResponse, 4000); // Call itself after 4 seconds
                }
                // If all automated responses displayed, the last message remains.
            } else {
                // Not yet in the automated sequence
                currentResponseIndex++; // Move to the next response for the next interaction
                tryAgainButton.style.display = 'block'; // Show the 'Try Again' button for manual advance
            }
        } else {
            // All responses displayed (including manual and automated), the last message remains.
            tryAgainButton.style.display = 'none'; // Hide the 'Try Again' button
            isAutomatedSequence = false;
        }
        // Clear the input field after submission, regardless of response phase
        nameInput.value = '';
    }

    function resetForm() {
        var nameInput = document.getElementById('nameInput');
        var interactionArea = document.getElementById('interactionArea');
        var questionText = document.getElementById('questionText');
        var tryAgainButton = document.getElementById('tryAgainButton');

        // Only reset if not in an automated sequence
        if (!isAutomatedSequence) {
            // Hide 'Try Again' button
            tryAgainButton.style.display = 'none';

            if (currentResponseIndex < responses.length) {
                // Reset for the next question in the sequence (if responses still available)
                questionText.innerText = 'What is your name?';
                interactionArea.style.display = 'block'; // Show input and button again
            } else {
                // If all responses have been shown, keep the interaction concluded (last message remains).
                interactionArea.style.display = 'none'; // Ensure input area remains hidden
            }
            // Clear input field (though it should already be clear from displayResponse) -
            // although it doesn't matter since the input field is hidden now.
            nameInput.value = '';
        }
    }
</script>
